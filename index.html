<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miniature Worlds Explorer</title>
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

<!-- =====================================================
     PROJECT STYLES
     ===================================================== -->

<!-- Theme -->
<link rel="stylesheet" href="css/variables.css">

<!-- Global styles -->
<link rel="stylesheet" href="css/base.css">

<!-- Home screen -->
<link rel="stylesheet" href="css/home.css">

<!-- Detail screen -->
<link rel="stylesheet" href="css/detail.css">

<!-- Bubble effects -->
<link rel="stylesheet" href="css/bubbles.css">

<!-- Animations -->
<link rel="stylesheet" href="css/animations.css">

<!-- Responsive overrides -->
<link rel="stylesheet" href="css/responsive.css">
</head>

<body class="app-background h-full overflow-hidden">

  <!-- =====================================================
       Floating bubbles: home screen background
       ===================================================== -->
  <div id="bubbleContainer" class="fixed inset-0 overflow-hidden pointer-events-none z-0"></div>

  <!-- =====================================================
       HOME SCREEN
       ===================================================== -->
  <div class="h-full flex flex-col relative z-10">

    <!-- Home page header -->
    <header class="flex-shrink-0 text-center py-3 md:py-4 px-2 md:px-4">
      <h1 class="page-title text-3xl sm:text-4xl md:text-5xl lg:text-5.5xl font-bold mb-1 md:mb-2 whitespace-nowrap">
        MINIATURE WORLDS EXPLORER
      </h1>
      <p class="text-base sm:text-lg md:text-2xl font-semibold text-teal-300 drop-shadow-lg">
        Discover the fascinating world of freshwater ecosystems!
      </p>
      <p class="text-sm sm:text-base md:text-2xl text-teal-200 italic drop-shadow-md">
        Tap to learn more about each organism
      </p>
    </header>

   <!-- Species card grid: populated by cards.js -->
    <main id="homeView"
      class="home-grid"
    </main>

  </div>

  <!-- =====================================================
     HOME SPECIES CARD TEMPLATE
     Cloned once per species by cards.js
     ===================================================== -->
  <template id="card-template">


      <div class="species-card">

         <div class="card-content">

        <!-- Home species image -->
      <div class="species-image">
          <img class="card-img w-full h-full object-cover rounded-full scale-125" loading="lazy" src="" alt="">
          <!-- Emoji fallback shown if image fails to load -->
          <span class="card-emoji" style="display:none;"></span>
        </div>

        <!-- Home species title -->
        <h3 class="card-name card-title"></h3>
      </div>

    </div>


  </template>

  <!-- =====================================================
     DETAIL SCREEN
     Hidden until a species card is selected.
     ===================================================== -->
  <div id="detailView" class="hidden fixed inset-0 z-50" style="background-color: #00577c;">

    <!-- Bubbles for the detail view -->
    <div id="detailBubbleContainer" class="fixed inset-0 overflow-hidden pointer-events-none z-0"></div>

    <!-- Fullscreen image modal -->
    <div id="fullscreenModal"
         class="hidden fixed inset-0 z-[100] bg-black bg-opacity-90 flex items-center justify-center backdrop-blur-sm">
      <div class="relative max-w-[90vw] max-h-[90vh] flex items-center justify-center">
        <img id="fullscreenImage" src="" alt=""
             class="max-w-full max-h-full object-contain rounded-lg shadow-2xl">
        <button id="closeFullscreen"
                class="absolute top-4 right-4 w-12 h-12 bg-white bg-opacity-20 hover:bg-opacity-30 rounded-full flex items-center justify-center text-white text-2xl font-bold transition-all duration-300 hover:scale-110 backdrop-blur-sm border border-white border-opacity-30">
          &times;
        </button>
        <div id="fullscreenCaption"
             class="absolute bottom-4 left-1/2 transform -translate-x-1/2 bg-black bg-opacity-50 text-white px-6 py-3 rounded-full backdrop-blur-sm border border-white border-opacity-20 text-center max-w-md">
        </div>
      </div>
    </div>

<!-- =====================================================
     HOME SCREEN
     ===================================================== -->
    <div class="h-full flex flex-col relative z-10">

      <!-- Back button -->
      <div class="flex-shrink-0 p-3 sm:p-4 md:p-6">
        <button id="backButton"
                class="flex items-center px-5 md:px-6 lg:px-8 py-3 md:py-4 rounded-lg shadow-lg cursor-pointer border border-white/20 transition-all duration-300 hover:scale-105 hover:shadow-xl text-white font-medium text-base md:text-lg lg:text-xl"
                style="background: linear-gradient(135deg, rgba(20,184,166,0.2) 0%, rgba(13,148,136,0.3) 100%);">
          <svg class="w-6 h-6 md:w-7 md:h-7 lg:w-8 lg:h-8 mr-2 md:mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
          </svg>

          <span>Back to Species Grid</span>
          
        </button>
      </div>

      <!-- Detail content -->
      <div class="flex-1 px-4 pb-4 overflow-hidden">
        <div class="bg-white rounded-2xl shadow-xl h-full overflow-hidden detail-view">
          <div id="detailContent" class="h-full"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- =====================================================
       DETAIL TEMPLATE
       Cloned and filled by detail.js; never visible directly
       ===================================================== -->
  <template id="detail-template">
    <div class="h-full flex flex-col">

      <!-- Detail header -->
      <div class="detail-header flex-shrink-0 relative h-24 sm:h-32 md:h-40 lg:h-48 flex items-center overflow-hidden">
        <div class="absolute inset-0 bg-black bg-opacity-10"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent animate-pulse"></div>

        <div class="relative z-10 flex items-center w-full px-3 sm:px-4 md:px-8">
          <div class="flex items-center flex-col sm:flex-row flex-1 gap-3 sm:gap-4 md:gap-10">

            <!-- Detail species image -->
            <div class="flex flex-col items-center">
              <div class="detail-img-wrapper w-20 h-20 sm:w-32 sm:h-32 md:w-40 md:h-40 rounded-full border-4 border-white/50 shadow-2xl overflow-hidden bg-white/15 backdrop-blur-sm hover:scale-110 transition-transform duration-300 ring-4 ring-white/20 cursor-pointer group">
                <img class="detail-img w-full h-full object-cover scale-125 group-hover:brightness-110 transition-all duration-300"
                     src="" alt="" loading="lazy">
                <!-- Zoom icon overlay -->
                <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 bg-black bg-opacity-30 rounded-full">
                  <svg class="w-5 h-5 sm:w-6 sm:h-6 md:w-8 md:h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path>
                  </svg>
                </div>
              </div>
            </div>

            <!-- Species information -->
            <div class="text-white flex-1">
              <h2 class="detail-name"></h2>
              <div class="flex flex-col sm:flex-row gap-1 sm:gap-2 md:gap-4 text-xs sm:text-sm md:text-base flex-wrap">
                <span class="detail-habitat bg-white/25 backdrop-blur-sm px-2 sm:px-3 md:px-4 py-1 md:py-2 rounded-full font-medium border border-white/20 shadow-lg"></span>
                <span class="detail-size bg-white/25 backdrop-blur-sm px-2 sm:px-3 md:px-4 py-1 md:py-2 rounded-full font-medium border border-white/20 shadow-lg"></span>
              </div>
            </div>
          </div>
        </div>

     <!-- Tap image label -->

   <div class="tap-image-container">

    <div class="tap-image-label">

        Tap the image to view up close

    </div>
</div>

        <!-- Header decorations -->
        <div class="absolute top-6 left-6 w-3 h-3 bg-white/40 rounded-full animate-ping"></div>
        <div class="absolute top-16 right-12 w-2 h-2 bg-white/50 rounded-full animate-ping" style="animation-delay:1s;"></div>
        <div class="absolute bottom-12 left-16 w-4 h-4 bg-white/30 rounded-full animate-ping" style="animation-delay:2s;"></div>
        <div class="absolute bottom-6 right-6 w-2 h-2 bg-white/45 rounded-full animate-ping" style="animation-delay:0.5s;"></div>
      </div>

      <!-- Detail information cards -->
      <div class="flex-1 p-2 sm:p-3 md:p-4 bg-gradient-to-b from-gray-50 to-white overflow-hidden">
        <div class="h-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2 sm:gap-3 md:gap-4">

          <!-- About card -->
          <div class="detail-card detail-about-card hover:scale-105">
            <!-- Accent bar -->
            <div class="detail-about-bar absolute top-0 left-0 w-full h-2"></div>
            <div class="absolute inset-0 bg-gradient-to-br from-white via-gray-50 to-gray-100 opacity-50"></div>
            <div class="relative z-10 flex flex-col h-full">
              <h3 class="detail-title">

                <span class="detail-about-icon w-7 h-7 sm:w-8 sm:h-8 md:w-9 md:h-9 rounded-full mr-2 md:mr-3 flex items-center justify-center text-white text-xs md:text-base shadow-lg">ℹ️</span>
                
                About This Species

              </h3>
           <div class="flex-1 overflow-hidden">
          <p class="detail-description text-gray-800 font-medium leading-relaxed"></p>
            </div>
            </div>
          </div>

          <!-- Characteristics card -->
          <div class="detail-card detail-about-card hover:scale-105">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-emerald-400 to-teal-500"></div>
            <div class="absolute inset-0 bg-gradient-to-br from-white via-emerald-50 to-teal-50 opacity-40"></div>
            <div class="relative z-10 flex flex-col h-full">
              <h3 class="detail-title">
                <span class="w-7 h-7 sm:w-8 sm:h-8 md:w-9 md:h-9 bg-gradient-to-r from-emerald-400 to-teal-500 rounded-full mr-2 md:mr-3 flex items-center justify-center text-white text-xs md:text-base shadow-lg">🔬</span>
                
                Key Characteristics

              </h3>
              <div class="flex-1 overflow-hidden">
              <ul class="detail-characteristics w-full relative z-10"></ul>
             </div>           
            </div>
          </div>

          <!-- Uses card -->
          <div class="detail-card detail-about-card hover:scale-105">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-400 to-indigo-500"></div>
            <div class="absolute inset-0 bg-gradient-to-br from-white via-blue-50 to-indigo-50 opacity-40"></div>
            <div class="relative z-10 flex flex-col h-full">
              <h3 class="detail-title">
                <span class="w-7 h-7 sm:w-8 sm:h-8 md:w-9 md:h-9 bg-gradient-to-r from-blue-400 to-indigo-500 rounded-full mr-2 md:mr-3 flex items-center justify-center text-white text-xs md:text-base shadow-lg">🌟</span>
                
                Common Uses
                
              </h3>
               <div class="flex-1 overflow-hidden">
               <ul class="detail-uses w-full relative z-10"></ul>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </template>

  <!-- =====================================================
       LIST ITEM TEMPLATE
       Used for both characteristics and uses lists
       ===================================================== -->
  <template id="list-item-template">
    <li class="flex items-center group">
      <span class="item-number
             w-8 h-8
             sm:w-9 sm:h-9
             md:w-10 md:h-10
             rounded-full mr-2 flex items-center justify-center text-white text-xs md:text-sm font-bold mt-0.5 group-hover:scale-110 transition-transform shadow-md flex-shrink-0"></span>
      <span class="item-text text-gray-800 group-hover:text-gray-900 transition-colors font-medium flex-1 leading-snug"></span>
    </li>
  </template>

 <!-- =====================================================
     APPLICATION SCRIPTS
     Load order is important.
     data.js first
     main.js last
     ===================================================== -->
  <script src="js/data.js"></script>
  <script src="js/textFit.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/bubbles.js"></script>
  <script src="js/detail.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
